name: Ubuntu Wrapper Checks

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "develop"
  pull_request:
    branches:
      - "main"
      - "develop"

permissions:
  contents: read

jobs:
  checks:
    name: Ubuntu ${{ matrix.os }} wrapper validation
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck Wrapper Scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck install.sh uninstall.sh tools/install/delegate-to-pcw.sh

      - name: Wrapper Dry-Run (PW Profile)
        env:
          PYPNM_WEBUI_WRAPPER_TEST: "1"
        run: |
          ./install.sh --with-pypnm-webui --pcw-dir /tmp/PyPNM-CMTS-WebUI

      - name: Wrapper Dry-Run (PCW Profile)
        env:
          PYPNM_WEBUI_WRAPPER_TEST: "1"
        run: |
          ./install.sh --with-pypnm-cmts-webui --pcw-dir /tmp/PyPNM-CMTS-WebUI

      - name: Uninstall Help Smoke Test
        run: |
          ./uninstall.sh --help
