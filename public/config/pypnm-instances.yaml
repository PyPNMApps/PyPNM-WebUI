version: 1
defaults:
  selected_instance: local-pypnm-agent
  poll_interval_ms: 5000
  request_timeout_ms: 30000
  health_path: /health
  logging:
    level: INFO
instances:
  - id: local-pypnm-agent
    label: Local PyPNM Agent
    base_url: http://127.0.0.1:8000
    enabled: true
    tags:
      - lab
      - local
    capabilities:
      - health
      - analysis
      - files
    polling:
      enabled: true
      interval_ms: 5000
    request_defaults:
      cable_modem:
        mac_address: 00:00:00:0B:1B:E0
        ip_address: 10.0.0.1
      tftp:
        ipv4: 127.0.0.1
        ipv6: ::1
      capture:
        channel_ids: []
      snmp:
        rw_community: private
